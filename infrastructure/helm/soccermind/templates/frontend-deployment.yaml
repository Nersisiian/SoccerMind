apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.frontend.name | default "frontend" }}
  labels:
    app: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: "{{ .Values.image.repository }}/{{ .Values.frontend.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend:8000/api/v1"
        - name: NEXTAUTH_URL
          value: "https://{{ .Values.ingress.host }}"
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: nextauth-secret
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5