apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.backend.name | default "backend" }}
  labels:
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: "{{ .Values.image.repository }}/{{ .Values.backend.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: secret-key
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: stripe-api-key
        - name: STRIPE_WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: stripe-webhook-secret
        - name: CORS_ORIGINS
          value: '["https://{{ .Values.ingress.host }}"]'
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-db
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10