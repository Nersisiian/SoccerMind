apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.worker.name | default "worker" }}
  labels:
    app: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
      - name: worker
        image: "{{ .Values.image.repository }}/{{ .Values.worker.image }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: secret-key
        - name: DATABASE_URL
          value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)"
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: soccermind-secrets
              key: postgres-db