name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soccermind
          POSTGRES_PASSWORD: soccermind_pass
          POSTGRES_DB: soccermind
        ports:
        - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

     
      - name: Apply database migrations
        env:
          DATABASE_URL: postgresql+asyncpg://soccermind:soccermind_pass@localhost:5432/soccermind
        run: |
          cd backend
          alembic upgrade head


